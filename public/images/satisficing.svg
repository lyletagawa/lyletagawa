<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="800" height="500" fill="#FFFFFF"/>

  <!-- Progress bar track -->
  <rect x="100" y="220" width="600" height="60" rx="30" fill="#F1F5F9"/>

  <!-- Progress bar fill (80%) -->
  <rect x="100" y="220" width="480" height="60" rx="30" fill="#475569"/>

  <!-- 100% tick mark -->
  <line x1="700" y1="200" x2="700" y2="300" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="700" y="190"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13" fill="#CBD5E1" font-weight="500" text-anchor="middle">100%</text>

  <!-- 80% label -->
  <text x="580" y="190"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13" fill="#475569" font-weight="600" text-anchor="middle">80%</text>

  <!-- Checkmark at end of fill -->
  <path d="M 530 238 L 558 272 L 618 212"
        stroke="#16A34A" stroke-width="7" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "Done." label below -->
  <text x="400" y="340"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16" fill="#94A3B8" font-weight="400" text-anchor="middle"
        letter-spacing="1">Done.</text>

</svg>
